# ------------------------------------------------------------------------------
# Within-spec thresholds per isotope
# ------------------------------------------------------------------------------
# These define whether a production is "passing" quality criteria.
# For gallium and indium, Philips and IBA cyclotrons have different nominals.
# For iodine, BOTH output_percent AND targetstroom must pass.
spec:

  gallium:
    metric: targetstroom
    unit: µA
    philips: {min: 75, max: 85}
    iba:     {min: 130, max: 140}

  rubidium:
    metric: efficiency
    unit: '%'
    min: 95
    max: 105

  indium:
    metric: targetstroom
    unit: µA
    philips: {min: 75, max: 85}
    iba:     {min: 130, max: 140}

  thallium:
    metric: targetstroom
    unit: µA
    min: 166
    max: 174

  iodine:
    within_spec:
      output:
        metric: output_percent
        unit: '%'
        min: 78
        max: 114.9
      targetstroom:
        metric: targetstroom
        unit: µA
        min: 96
        max: 124
    chart_colors:
      yield:
        metric: yield_percent
        unit: '%'
        min: 80
        max: null   # No maximum — higher is always better


# ------------------------------------------------------------------------------
# OTIF threshold — percentage at or above which a week is considered "green"
# ------------------------------------------------------------------------------
otif_green_threshold: 97
